name: health_monitor
description: Health monitoring app with Bluetooth & image recognition
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Bluetooth
  flutter_blue_plus: ^2.2.1
  permission_handler: ^12.0.1
  pedometer: ^4.0.1

  # Camera & Image Processing
  camera: ^0.12.0+1
  image: ^4.1.7

  # Database
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0

  # State Management
  provider: ^6.1.2

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Export & Share
  csv: ^8.0.0
  share_plus: ^12.0.2
  path_provider: ^2.1.3

  # UI & Charts
  fl_chart: ^1.2.0
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  lottie: ^3.1.0
  shimmer: ^3.0.0
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  reorderable_grid_view: ^2.2.8
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
